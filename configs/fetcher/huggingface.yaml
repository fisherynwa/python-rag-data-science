# configs/fetcher/huggingface.yaml
_target_: src.fetcher.HuggingFaceFetcher
dataset_name: "iamtarun/python_code_instructions_18k_alpaca"
max_rows: 100
seed: 42
# Keywords used to filter rows from the Hugging Face (HF) dataset.
# Only rows where the instruction or output contains at least
# one of these keywords will be indexed into Weaviate.
# Add or remove keywords to broaden or narrow the corpus at hand.
keywords:
  - python
  - pandas
  - scikit-learn
  - sklearn